quiz:
  title: "Quiz tổng quan lập trình web với Python và JavaScript"
  description: "Kiểm tra nhanh các khái niệm nền tảng về HTML/CSS, Git, Django, SQL và JavaScript."
  time_limit_minutes: 15
  questions:
    - question_text: "DOM trong trình duyệt biểu diễn điều gì?"
      options:
        - "Cấu trúc cây của tài liệu HTML"
        - "Một cơ sở dữ liệu quan hệ"
        - "Một file cấu hình Git"
        - "Một giao thức truyền file"
      correct_option_index: 0
      explanation: "DOM là cấu trúc cây mà trình duyệt tạo ra từ HTML để JavaScript và CSS có thể thao tác."
    - question_text: "Lệnh Git nào thường dùng để lưu một mốc thay đổi vào lịch sử repository?"
      options:
        - "git commit"
        - "git render"
        - "git migrate"
        - "git listen"
      correct_option_index: 0
      explanation: "git commit tạo một snapshot của thay đổi đã được đưa vào staging area."
    - question_text: "Trong Django, URL routing thường dùng để làm gì?"
      options:
        - "Ánh xạ URL đến view xử lý request"
        - "Tối ưu kích thước ảnh"
        - "Tạo khóa chính cho database"
        - "Biên dịch JavaScript thành CSS"
      correct_option_index: 0
      explanation: "Route quyết định view nào sẽ được gọi khi request khớp với một URL nhất định."
    - question_text: "Migration trong Django có vai trò chính là gì?"
      options:
        - "Quản lý thay đổi schema database theo phiên bản"
        - "Tạo event click trên frontend"
        - "Nén video bài giảng"
        - "Thay thế hoàn toàn SQL bằng HTML"
      correct_option_index: 0
      explanation: "Migration ghi lại thay đổi model/schema và áp dụng chúng vào database một cách có kiểm soát."
    - question_text: "JavaScript phía trình duyệt thường được dùng để làm gì?"
      options:
        - "Tạo tương tác giao diện và gọi API"
        - "Cấp phát RAM cho hệ điều hành"
        - "Thiết kế quan hệ khóa ngoại"
        - "Quản lý branch trong Git"
      correct_option_index: 0
      explanation: "JavaScript giúp xử lý event, thao tác DOM, lưu dữ liệu cục bộ và gọi API từ frontend."

discussions:
  - title: "Thắc mắc về kiến trúc client-server"
    messages:
      - author: "teacher"
        content: "Trong tuần này, các bạn hãy phân biệt rõ vai trò của frontend, backend và database trong một ứng dụng web."
      - author: "student"
        content: "Thưa thầy, khi người dùng bấm nút gửi form thì dữ liệu đi qua những bước nào trước khi được lưu vào database?"
      - author: "student_2"
        content: "Theo em, frontend validate dữ liệu trước, sau đó gọi API backend bằng HTTP request."
      - author: "student_3"
        content: "Backend sẽ kiểm tra quyền, validate lại dữ liệu, xử lý nghiệp vụ rồi mới ghi vào database."
      - author: "student_4"
        content: "Nếu backend trả lỗi 400 hoặc 401 thì frontend nên hiển thị thông báo cụ thể thay vì chỉ báo thất bại chung."
      - author: "student_5"
        content: "Em hiểu luồng đầy đủ là form -> frontend state -> API request -> controller/service -> database -> response về UI."
      - author: "teacher"
        content: "Đúng hướng. Các bạn lưu ý phần validate ở frontend chỉ hỗ trợ trải nghiệm, backend vẫn là lớp bắt buộc phải kiểm tra dữ liệu và phân quyền."

assignment:
  title: "Project 0 - Thiết kế trang web tĩnh bằng HTML/CSS"
  description: |
    Sinh viên xây dựng một website tĩnh gồm nhiều trang HTML, sử dụng CSS để định kiểu và áp dụng responsive design.
    Bài nộp cần có cấu trúc thư mục rõ ràng, liên kết giữa các trang và giao diện hiển thị tốt trên nhiều kích thước màn hình.
  due_date: "2026-06-15T23:59:00+07:00"
  attachments:
    - file_path_or_url: "https://cs50.harvard.edu/web/projects/0/"
  sample_submission:
    student_file_path_or_url: ""
    content: "Demo submission: em đã hoàn thành website tĩnh với 4 trang gồm Home, About, Projects và Contact."
