sections:
  - title: "Tuần 1 - HTML, CSS và nền tảng giao diện web"
    order_index: 1
    lessons:
      - title: "Cấu trúc trang web với HTML"
        description: "Làm quen với HTML, DOM, thẻ nội dung, biểu mẫu và cách trình duyệt biểu diễn cấu trúc tài liệu."
        order_index: 1
        contents:
          - type: "text"
            title: "HTML và DOM"
            content: |
              HTML là ngôn ngữ đánh dấu dùng để mô tả cấu trúc của một trang web. Mỗi phần tử như heading, paragraph, image, link, table hoặc form tạo thành một node trong cây DOM.
              Khi trình duyệt tải trang, HTML được phân tích thành DOM để JavaScript và CSS có thể thao tác hoặc định kiểu giao diện.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 0 - HTML and CSS"
            file_url: "https://www.youtube.com/watch?v=zFZrkCIc2Oc"
            duration: 108
            order_index: 2
          - type: "file"
            title: "Lecture 0 Slides - HTML and CSS"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/0/lecture0.pdf"
            duration: 5
            order_index: 3
      - title: "CSS, responsive design và Bootstrap"
        description: "Tìm hiểu selector, specificity, responsive design, flexbox, grid, Bootstrap và Sass."
        order_index: 2
        contents:
          - type: "text"
            title: "CSS trong thiết kế giao diện"
            content: |
              CSS kiểm soát cách trang web được hiển thị: màu sắc, kích thước, khoảng cách, bố cục và khả năng thích ứng với nhiều kích thước màn hình.
              Responsive design giúp giao diện hoạt động tốt trên desktop, tablet và mobile. Bootstrap cung cấp sẵn hệ thống grid và component để tăng tốc quá trình xây dựng UI.
            duration: 10
            order_index: 1
          - type: "file"
            title: "Source Code - Lecture 0"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/0/src0.zip"
            duration: 5
            order_index: 2

  - title: "Tuần 2 - Git, GitHub và Python nền tảng"
    order_index: 2
    lessons:
      - title: "Quản lý mã nguồn với Git"
        description: "Nắm các thao tác clone, add, commit, branch, merge conflict, fork và pull request."
        order_index: 1
        contents:
          - type: "text"
            title: "Vai trò của Git trong dự án web"
            content: |
              Git giúp theo dõi lịch sử thay đổi của mã nguồn, thử nghiệm tính năng mới bằng branch và phối hợp với nhiều thành viên qua remote repository.
              Trong môi trường làm web, GitHub thường được dùng để review code, tạo pull request, quản lý issue và triển khai tài liệu qua GitHub Pages.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 1 - Git"
            file_url: "https://www.youtube.com/watch?v=NcoBAfJ6l2Q"
            duration: 70
            order_index: 2
          - type: "file"
            title: "Lecture 1 Slides - Git"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/1/lecture1.pdf"
            duration: 5
            order_index: 3
      - title: "Python cho lập trình web"
        description: "Ôn biến, điều kiện, vòng lặp, hàm, module, OOP, functional programming và exception."
        order_index: 2
        contents:
          - type: "text"
            title: "Python làm backend"
            content: |
              Python thường được dùng ở backend vì cú pháp rõ ràng, thư viện phong phú và có framework mạnh như Django hoặc Flask.
              Các khái niệm như function, class, module và exception giúp tổ chức code rõ ràng hơn trước khi xây dựng ứng dụng web hoàn chỉnh.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 2 - Python"
            file_url: "https://www.youtube.com/watch?v=EOLPQdVj5Ac"
            duration: 65
            order_index: 2
          - type: "file"
            title: "Lecture 2 Slides - Python"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/2/lecture2.pdf"
            duration: 5
            order_index: 3

  - title: "Tuần 3 - Django và kiến trúc ứng dụng web"
    order_index: 3
    lessons:
      - title: "HTTP, route và view trong Django"
        description: "Hiểu request/response, URL routing, view function và cách Django xử lý một request."
        order_index: 1
        contents:
          - type: "text"
            title: "Luồng request trong Django"
            content: |
              Một ứng dụng Django thường nhận HTTP request, khớp URL với route, gọi view tương ứng, xử lý dữ liệu rồi trả về HTTP response.
              Cách tổ chức này giúp tách logic xử lý, template hiển thị và dữ liệu, làm ứng dụng dễ bảo trì hơn khi chức năng tăng dần.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 3 - Django"
            file_url: "https://www.youtube.com/watch?v=w8q0C-C1js4"
            duration: 78
            order_index: 2
          - type: "file"
            title: "Lecture 3 Slides - Django"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/3/lecture3.pdf"
            duration: 5
            order_index: 3
      - title: "Template, form và session"
        description: "Sử dụng template để render HTML động, form để nhận dữ liệu và session để lưu trạng thái người dùng."
        order_index: 2
        contents:
          - type: "text"
            title: "Template và session"
            content: |
              Template cho phép backend truyền dữ liệu vào HTML để tạo giao diện động. Form giúp người dùng gửi dữ liệu về server thông qua GET hoặc POST.
              Session lưu trạng thái giữa nhiều request, ví dụ người dùng đã đăng nhập hay giỏ hàng hiện tại gồm những sản phẩm nào.
            duration: 10
            order_index: 1

  - title: "Tuần 4 - SQL, models và migrations"
    order_index: 4
    lessons:
      - title: "Cơ sở dữ liệu quan hệ và SQL"
        description: "Làm việc với table, khóa chính, khóa ngoại, quan hệ và câu lệnh truy vấn dữ liệu."
        order_index: 1
        contents:
          - type: "text"
            title: "SQL trong ứng dụng web"
            content: |
              Phần lớn ứng dụng web cần lưu dữ liệu lâu dài như tài khoản, bài học, đơn hàng hoặc bài nộp. SQL giúp truy vấn, lọc, nhóm và cập nhật dữ liệu trong cơ sở dữ liệu quan hệ.
              Thiết kế bảng tốt giúp giảm trùng lặp dữ liệu, đảm bảo toàn vẹn và làm API dễ mở rộng hơn.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 4 - SQL, Models and Migrations"
            file_url: "https://www.youtube.com/watch?v=YzP164YANAU"
            duration: 111
            order_index: 2
          - type: "file"
            title: "Lecture 4 Slides - SQL, Models, and Migrations"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/4/lecture4.pdf"
            duration: 5
            order_index: 3
      - title: "Django Models và migrations"
        description: "Ánh xạ bảng dữ liệu sang model class và quản lý thay đổi schema bằng migration."
        order_index: 2
        contents:
          - type: "text"
            title: "Models và migrations"
            content: |
              Django model biểu diễn dữ liệu bằng class Python, sau đó ORM chuyển thao tác trên object thành truy vấn SQL.
              Migration ghi lại thay đổi schema theo từng bước, giúp nhiều môi trường như máy dev, staging và production có thể đồng bộ cấu trúc database.
            duration: 10
            order_index: 1

  - title: "Tuần 5 - JavaScript, UI và kiểm thử"
    order_index: 5
    lessons:
      - title: "JavaScript và thao tác DOM"
        description: "Tạo tương tác frontend bằng event, DOM manipulation, local storage và API."
        order_index: 1
        contents:
          - type: "text"
            title: "JavaScript trong frontend"
            content: |
              JavaScript chạy trong trình duyệt và cho phép trang web phản hồi hành động của người dùng mà không cần tải lại toàn bộ trang.
              Các thao tác thường gặp gồm lắng nghe event, thay đổi DOM, lưu dữ liệu nhỏ bằng localStorage và gọi API để lấy dữ liệu từ backend.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 5 - JavaScript"
            file_url: "https://www.youtube.com/watch?v=x5trGVMKTdY"
            duration: 83
            order_index: 2
          - type: "file"
            title: "Lecture 5 Slides - JavaScript"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/5/lecture5.pdf"
            duration: 5
            order_index: 3
      - title: "Single-page app, React và kiểm thử"
        description: "Tổng quan SPA, React, animation, infinite scroll, unit testing, Selenium, CI/CD và Docker."
        order_index: 2
        contents:
          - type: "text"
            title: "UI hiện đại và kiểm thử"
            content: |
              Single-page application giảm số lần tải lại trang bằng cách cập nhật từng phần giao diện. React hỗ trợ xây dựng UI theo component, giúp tái sử dụng và quản lý trạng thái tốt hơn.
              Kiểm thử và CI/CD giúp phát hiện lỗi sớm. Với ứng dụng web, test có thể bao gồm unit test, test giao diện bằng Selenium và pipeline tự động bằng GitHub Actions.
            duration: 10
            order_index: 1
          - type: "video"
            title: "CS50W Lecture 6 - User Interfaces"
            file_url: "https://www.youtube.com/watch?v=jrBhi8wbzPw"
            duration: 78
            order_index: 2
          - type: "video"
            title: "CS50W Lecture 7 - Testing and CI/CD"
            file_url: "https://www.youtube.com/watch?v=WbRDkJ4lPdY"
            duration: 81
            order_index: 3
          - type: "file"
            title: "Lecture 6 Slides - User Interfaces"
            file_path_or_url: "https://cdn.cs50.net/web/2020/spring/lectures/6/lecture6.pdf"
            duration: 5
            order_index: 4

